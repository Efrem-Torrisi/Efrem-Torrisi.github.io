<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Solid background -->
  <rect x="0" y="0" width="400" height="400" rx="48" fill="#EEEDFE"/>
  <rect x="0" y="0" width="400" height="400" rx="48" fill="none" stroke="#AFA9EC" stroke-width="2.5"/>

  <!-- RGB accent bar top -->
  <rect x="60" y="20" width="96" height="12" rx="6" fill="#E24B4A"/>
  <rect x="152" y="20" width="96" height="12" rx="6" fill="#1D9E75"/>
  <rect x="244" y="20" width="96" height="12" rx="6" fill="#378ADD"/>

  <!-- HLSL massive -->
  <text x="200" y="160" text-anchor="middle" dominant-baseline="central" font-family="'Courier New', 'Consolas', 'Liberation Mono', monospace" font-size="120" font-weight="700" fill="#26215C">HLSL</text>

  <!-- Thin divider -->
  <line x1="40" y1="210" x2="360" y2="210" stroke="#AFA9EC" stroke-width="2"/>

  <!-- GLSL massive -->
  <text x="200" y="268" text-anchor="middle" dominant-baseline="central" font-family="'Courier New', 'Consolas', 'Liberation Mono', monospace" font-size="120" font-weight="700" fill="#26215C">GLSL</text>

  <!-- Tiny shader hint -->
  <text x="200" y="360" text-anchor="middle" dominant-baseline="central" font-family="'Courier New', 'Consolas', 'Liberation Mono', monospace" font-size="28" fill="#7F77DD" opacity="0.5">&lt;shader/&gt;</text>
</svg>
